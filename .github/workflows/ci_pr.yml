name: CI (PR)

on:
  pull_request:
    branches: ["main"]
    paths:
      - "apps/**"
      - "pyproject.toml"
      - "uv.lock"
      - "package.json"
      - "package-lock.json"
      - ".pre-commit-config.yaml"
      - ".github/workflows/ci_pr.yml"
      - ".github/actions/**"

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr:
    name: Lint + Pytest (ephemeral site)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          persist-credentials: false

      - name: Setup bench env (Python + venv cache)
        uses: ./.github/actions/setup-bench
        with:
          python-version: "3.12"
          setup-node: "false"

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: precommit-${{ runner.os }}-py312-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Fetch PR base/head SHAs (for pre-commit diff)
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

      - name: Lint (pre-commit on PR diff)
        run: |
          ./env/bin/pre-commit run --from-ref "${{ github.event.pull_request.base.sha }}" --to-ref "${{ github.event.pull_request.head.sha }}" --show-diff-on-failure

      - name: Write CI common_site_config.json (no secrets)
        run: |
          mkdir -p sites
          ./env/bin/python - <<'PY'
          import json
          from pathlib import Path
          cfg = {
              "db_host": "127.0.0.1",
              "db_port": 3306,
              "db_root_password": "root",
              "redis_cache": "redis://127.0.0.1:6379",
              "redis_queue": "redis://127.0.0.1:6379",
              "redis_socketio": "redis://127.0.0.1:6379",
              "developer_mode": 1,
              "maintenance_mode": 0,
              "pause_scheduler": 1,
          }
          Path("sites/common_site_config.json").write_text(json.dumps(cfg, indent=2) + "\n")
          PY

      - name: Create ephemeral site (test_site)
        env:
          SITE_NAME: test_site
        run: |
          ./env/bin/bench new-site "${SITE_NAME}" \
            --admin-password admin \
            --mariadb-root-password root \
            --db-host 127.0.0.1 \
            --db-port 3306 \
            --no-mariadb-socket \
            --force
          ./env/bin/bench --site "${SITE_NAME}" install-app erpnext
          ./env/bin/bench --site "${SITE_NAME}" install-app ferum_custom

      - name: Pytest (ferum_custom)
        env:
          SITE_NAME: test_site
        run: |
          ./env/bin/pytest -q apps/ferum_custom/ferum_custom/tests
