name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  packages: write
  id-token: write
  actions: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/erpnext

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit

      - name: Run linters (pre-commit)
        run: pre-commit run --all-files --show-diff-on-failure

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build static assets
        run: |
          # Install bench and app dependencies for build
          python -m venv env
          ./env/bin/pip install --upgrade pip
          ./env/bin/pip install "frappe-bench<6"
          ./env/bin/pip install -r apps/frappe/requirements.txt
          ./env/bin/pip install -r apps/erpnext/requirements.txt
          ./env/bin/pip install -r apps/ferum_custom/requirements.txt
          
          # Run bench build for the custom app
          ./env/bin/bench build --app ferum_custom

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/ferum_custom/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bench & dependencies
        run: |
          python -m venv env
          ./env/bin/pip install --upgrade pip
          ./env/bin/pip install "frappe-bench<6"
          ./env/bin/pip install -r apps/frappe/requirements.txt
          ./env/bin/pip install -r apps/erpnext/requirements.txt
          ./env/bin/pip install -r apps/ferum_custom/requirements.txt

      - name: Configure common_site_config for CI
        run: |
          ./env/bin/python - <<'PY'
          import json, pathlib
          cfg_path = pathlib.Path("sites/common_site_config.json")
          data = json.loads(cfg_path.read_text())
          data.update(
              {
                  "db_host": "127.0.0.1",
                  "db_port": 3306,
                  "db_root_password": "root",
                  "redis_cache": "redis://127.0.0.1:6379",
                  "redis_queue": "redis://127.0.0.1:6379",
                  "redis_socketio": "redis://127.0.0.1:6379",
                  "developer_mode": 1,
              }
          )
          cfg_path.write_text(json.dumps(data, indent=1))
          PY

      - name: Bootstrap site
        env:
          SITE_NAME: test_site
        run: |
          ./env/bin/bench new-site "${SITE_NAME}" --admin-password admin --mariadb-root-password root --db-host 127.0.0.1 --db-port 3306 --no-mariadb-socket --force
          ./env/bin/bench --site "${SITE_NAME}" install-app erpnext
          ./env/bin/bench --site "${SITE_NAME}" install-app ferum_custom
          ./env/bin/bench --site "${SITE_NAME}" migrate
          ./env/bin/bench --site "${SITE_NAME}" migrate

      - name: Run tests
        env:
          SITE_NAME: test_site
        run: ./env/bin/bench --site "${SITE_NAME}" run-tests --app ferum_custom

  deploy:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH || 'main' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Ensure remote directory
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}"

      - name: Update remote code
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "cd ${{ env.DEPLOY_PATH }} && git fetch --all --prune && git checkout ${{ env.DEPLOY_BRANCH }} && git reset --hard origin/${{ env.DEPLOY_BRANCH }}"

      - name: Run remote deployment script
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image }}
          BACKUP_FILE: ${{ secrets.DEPLOY_BACKUP_FILE }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "cd ${{ env.DEPLOY_PATH }} && BACKUP_FILE='${{ env.BACKUP_FILE }}' ./scripts/deploy.sh deploy '${{ env.IMAGE_TAG }}'"

      - name: Deployment notification (placeholder)
        run: echo "Deployment to ${{ env.DEPLOY_HOST }} completed successfully!"
        # TODO: Add actual notification logic (e.g., to Telegram, Slack, GitHub comments)

