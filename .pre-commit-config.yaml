repos:
  # Basic hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
        files: ^apps/ferum_custom/
      - id: check-yaml
        files: ^apps/ferum_custom/
      - id: check-toml
        files: ^apps/ferum_custom/
      - id: check-json
        files: ^apps/ferum_custom/
      - id: end-of-file-fixer
        files: ^apps/ferum_custom/
      - id: trailing-whitespace
        files: ^apps/ferum_custom/
      - id: mixed-line-ending
        files: ^apps/ferum_custom/
      - id: check-added-large-files
        files: ^apps/ferum_custom/
        exclude: '^(env/|\\.venv/|node_modules/|sites/|build/)'

  # Python: Ruff (lint + format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        name: ruff (lint)
        args: ["--fix"]
        files: ^apps/ferum_custom/.*\\.py$
      - id: ruff-format
        name: ruff (format)
        files: ^apps/ferum_custom/.*\\.py$

  # Python: mypy (type checking)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^apps/ferum_custom/.*\\.py$
        additional_dependencies: ["types-requests"]
        args:
          [
            "--config-file=pyproject.toml",
          ]

  # JS/TS/HTML/CSS: Prettier (format)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier
        files: ^apps/ferum_custom/.*\\.(js|jsx|ts|tsx|css|scss|html|json|md|yaml|yml|jinja|j2)$

  # JS: ESLint (lint)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.4.0
    hooks:
      - id: eslint
        name: eslint
        files: ^apps/ferum_custom/.*\\.(js|jsx|ts|tsx)$
        additional_dependencies:
          [
            "eslint@9.4.0",
            "eslint-config-prettier@9.1.0"
          ]

  # Local custom hooks
  - repo: local
    hooks:
      - id: git-secrets-scan
        name: git-secrets (pattern scan)
        entry: python3 scripts/precommit/git_secrets_scan.py
        language: system
        pass_filenames: true
        files: ^apps/ferum_custom/
      - id: check-doctype-inits
        name: Check __init__.py in doctype packages
        entry: python3 scripts/precommit/check_doctype_inits.py
        language: system
        files: ^apps/ferum_custom/.*
        pass_filenames: false
      - id: check-forbidden-patterns
        name: Check forbidden patterns (print, unsafe frappe.db.sql)
        entry: python3 scripts/precommit/check_forbidden_patterns.py
        language: system
        files: ^apps/ferum_custom/.*\\.py$
        pass_filenames: true
