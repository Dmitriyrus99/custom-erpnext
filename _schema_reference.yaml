version: 1.0
target_database: MariaDB 10.6+

schema_definition:
  - name: "Create Directories (Master Data)"
    sql: |
      -- Справочник: Контрагенты
      CREATE TABLE IF NOT EXISTS `tabCounterparty` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `company` VARCHAR(140) NOT NULL,
        `name_full` TEXT,
        `name_short` VARCHAR(255),
        `inn` VARCHAR(12),
        `kpp` VARCHAR(9),
        `address` TEXT,
        UNIQUE KEY `idx_company_inn` (`company`, `inn`),
        INDEX `idx_company_name_short` (`company`, `name_short`(191)),
        FOREIGN KEY (`company`) REFERENCES `tabCompany`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

      -- Справочник: Проекты
      CREATE TABLE IF NOT EXISTS `tabProject` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `company` VARCHAR(140) NOT NULL,
        `code` VARCHAR(100) NOT NULL,
        `project_name` VARCHAR(255),
        `address` TEXT,
        `customer` VARCHAR(140),
        `status` VARCHAR(100),
        UNIQUE KEY `idx_company_code` (`company`, `code`),
        FOREIGN KEY (`company`) REFERENCES `tabCompany`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE,
        FOREIGN KEY (`customer`) REFERENCES `tabCounterparty`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

      -- Справочник: Номенклатура (Товары и Материалы)
      CREATE TABLE IF NOT EXISTS `tabItem` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `company` VARCHAR(140),
        `item_name` VARCHAR(255) NOT NULL,
        `unit` VARCHAR(50),
        `standard_rate` DECIMAL(18, 2) DEFAULT 0.00
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

      -- Справочник: Статьи движения денежных средств (ДДС)
      CREATE TABLE IF NOT EXISTS `tabCashflow_Article` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `direction` VARCHAR(3) NOT NULL,
        `group_name` VARCHAR(100),
        CHECK (`direction` IN ('in', 'out'))
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

  - name: "Create Operational Tables"
    sql: |
      -- Операции: Договоры
      CREATE TABLE IF NOT EXISTS `tabContract` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `company` VARCHAR(140) NOT NULL,
        `contract_no` VARCHAR(255) NOT NULL,
        `contract_no_normalized` VARCHAR(255),
        `customer` VARCHAR(140),
        `project` VARCHAR(140),
        `date_start` DATE,
        `date_end` DATE,
        `amount_max` DECIMAL(18, 2),
        `terms` TEXT,
        `status` VARCHAR(100) DEFAULT 'active',
        UNIQUE KEY `idx_company_contract_norm` (`company`, `contract_no_normalized`(191)),
        CHECK (`date_start` <= `date_end`),
        FOREIGN KEY (`company`) REFERENCES `tabCompany`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE,
        FOREIGN KEY (`customer`) REFERENCES `tabCounterparty`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE,
        FOREIGN KEY (`project`) REFERENCES `tabProject`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

      -- Операции: Этапы Договоров (дочерняя таблица)
      CREATE TABLE IF NOT EXISTS `tabContract_Stage` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `parent` VARCHAR(140),
        `parenttype` VARCHAR(140),
        `stage_no` INT,
        `stage_name` VARCHAR(255),
        `period_from` DATE,
        `period_to` DATE,
        `amount_plan` DECIMAL(18, 2),
        FOREIGN KEY (`parent`) REFERENCES `tabContract`(`name`) ON DELETE CASCADE ON UPDATE CASCADE
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

      -- Операции: Акты выполненных работ
      CREATE TABLE IF NOT EXISTS `tabService_Act` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `company` VARCHAR(140) NOT NULL,
        `contract` VARCHAR(140),
        `stage` VARCHAR(140),
        `act_no` VARCHAR(100),
        `act_date` DATE,
        `amount` DECIMAL(18, 2),
        `file_url` TEXT,
        FOREIGN KEY (`company`) REFERENCES `tabCompany`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE,
        FOREIGN KEY (`contract`) REFERENCES `tabContract`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE,
        FOREIGN KEY (`stage`) REFERENCES `tabContract_Stage`(`name`) ON DELETE SET NULL ON UPDATE CASCADE
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

      -- Операции: Заявки на обслуживание
      CREATE TABLE IF NOT EXISTS `tabService_Request` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `company` VARCHAR(140) NOT NULL,
        `project` VARCHAR(140),
        `request_type` VARCHAR(100),
        `status` VARCHAR(100),
        `creation_time` DATETIME(6),
        `resolution_time` DATETIME(6),
        `assigned_engineer` VARCHAR(140),
        `description` TEXT,
        CHECK (`creation_time` <= `resolution_time`),
        FOREIGN KEY (`company`) REFERENCES `tabCompany`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE,
        FOREIGN KEY (`project`) REFERENCES `tabProject`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

      -- Операции: Отчеты о сервисе
      CREATE TABLE IF NOT EXISTS `tabService_Report` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `company` VARCHAR(140) NOT NULL,
        `request` VARCHAR(140) NOT NULL,
        `report_date` DATE,
        `work_description` TEXT,
        `author` VARCHAR(140),
        FOREIGN KEY (`company`) REFERENCES `tabCompany`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE,
        FOREIGN KEY (`request`) REFERENCES `tabService_Request`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

      -- Операции: Вложения (универсальная)
      CREATE TABLE IF NOT EXISTS `tabAttachment` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `company` VARCHAR(140),
        `file_name` VARCHAR(255),
        `file_url` TEXT,
        `parent_type` VARCHAR(140),
        `parent_id` VARCHAR(140)
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

      -- Операции: Списание материалов (дочерняя к Отчету о сервисе)
      CREATE TABLE IF NOT EXISTS `tabStock_Entry` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `parent` VARCHAR(140),
        `parenttype` VARCHAR(140),
        `company` VARCHAR(140) NOT NULL,
        `item` VARCHAR(140) NOT NULL,
        `quantity` DECIMAL(18, 6),
        `warehouse` VARCHAR(140),
        `entry_type` VARCHAR(100),
        `entry_date` DATE,
        FOREIGN KEY (`parent`) REFERENCES `tabService_Report`(`name`) ON DELETE CASCADE ON UPDATE CASCADE,
        FOREIGN KEY (`company`) REFERENCES `tabCompany`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE,
        FOREIGN KEY (`item`) REFERENCES `tabItem`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

  - name: "Create Financial Tables"
    sql: |
      -- Финансы: Счета-фактуры
      CREATE TABLE IF NOT EXISTS `tabInvoice` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `company` VARCHAR(140) NOT NULL,
        `invoice_no` VARCHAR(100) NOT NULL,
        `invoice_year` SMALLINT NOT NULL,
        `invoice_date` DATE NOT NULL,
        `contract` VARCHAR(140),
        `project` VARCHAR(140),
        `customer` VARCHAR(140),
        `amount` DECIMAL(18, 2) NOT NULL,
        `status` VARCHAR(100) DEFAULT 'draft',
        `source_email` VARCHAR(255),
        UNIQUE KEY `idx_company_year_no` (`company`, `invoice_year`, `invoice_no`),
        FOREIGN KEY (`company`) REFERENCES `tabCompany`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE,
        FOREIGN KEY (`contract`) REFERENCES `tabContract`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE,
        FOREIGN KEY (`project`) REFERENCES `tabProject`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE,
        FOREIGN KEY (`customer`) REFERENCES `tabCounterparty`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

      -- Финансы: Позиции Счета-фактуры (дочерняя таблица)
      CREATE TABLE IF NOT EXISTS `tabInvoice_Item` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `parent` VARCHAR(140),
        `parenttype` VARCHAR(140),
        `item_name` VARCHAR(255),
        `qty` DECIMAL(18, 6),
        `uom` VARCHAR(50),
        `price` DECIMAL(18, 2),
        `amount` DECIMAL(18, 2),
        FOREIGN KEY (`parent`) REFERENCES `tabInvoice`(`name`) ON DELETE CASCADE ON UPDATE CASCADE
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

      -- Финансы: Платежи
      CREATE TABLE IF NOT EXISTS `tabPayment` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `company` VARCHAR(140) NOT NULL,
        `trx_date` DATE NOT NULL,
        `amount` DECIMAL(18, 2) NOT NULL,
        `account` VARCHAR(255),
        `direction` VARCHAR(3) NOT NULL,
        `article` VARCHAR(140),
        `counterparty` VARCHAR(140),
        `doc_ref` TEXT,
        CHECK (`amount` > 0),
        CHECK (`direction` IN ('in', 'out')),
        FOREIGN KEY (`company`) REFERENCES `tabCompany`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE,
        FOREIGN KEY (`article`) REFERENCES `tabCashflow_Article`(`name`) ON DELETE RESTRICT ON UPDATE CASCADE,
        FOREIGN KEY (`counterparty`) REFERENCES `tabCounterparty`(`name`) ON DELETE SET NULL ON UPDATE CASCADE
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

      -- Финансы: Распределение платежей по счетам
      CREATE TABLE IF NOT EXISTS `tabPayment_Allocation` (
        `name` VARCHAR(140) NOT NULL PRIMARY KEY,
        `creation` DATETIME(6),
        `modified` DATETIME(6),
        `modified_by` VARCHAR(140),
        `owner` VARCHAR(140),
        `docstatus` INT(1) NOT NULL DEFAULT 0,
        `idx` INT(8) NOT NULL DEFAULT 0,
        `payment` VARCHAR(140) NOT NULL,
        `invoice` VARCHAR(140) NOT NULL,
        `amount` DECIMAL(18, 2) NOT NULL,
        UNIQUE KEY `idx_payment_invoice` (`payment`, `invoice`),
        CHECK (`amount` > 0),
        FOREIGN KEY (`payment`) REFERENCES `tabPayment`(`name`) ON DELETE CASCADE ON UPDATE CASCADE,
        FOREIGN KEY (`invoice`) REFERENCES `tabInvoice`(`name`) ON DELETE CASCADE ON UPDATE CASCADE
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

  - name: "Create Staging & Logging Tables"
    sql: |
      -- Таблица для сырых данных (ETL)
      CREATE TABLE IF NOT EXISTS `tabStg_Raw` (
        `id` BIGINT NOT NULL AUTO_INCREMENT PRIMARY KEY,
        `company` VARCHAR(140),
        `source_file` VARCHAR(255),
        `sheet` VARCHAR(100),
        `row_json` JSON NOT NULL,
        `ingested_at` TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

      -- Таблица для фиксации проблем с качеством данных
      CREATE TABLE IF NOT EXISTS `tabData_Issue` (
        `id` BIGINT NOT NULL AUTO_INCREMENT PRIMARY KEY,
        `entity` VARCHAR(140) NOT NULL,
        `entity_id` VARCHAR(140),
        `severity` VARCHAR(50) NOT NULL,
        `message` TEXT NOT NULL,
        `detected_at` TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        `resolved_at` TIMESTAMP NULL
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

performance_optimizations:
  - name: "Table Partitioning"
    sql: |
      -- Партиционирование Счетов (tabInvoice) по году
      ALTER TABLE `tabInvoice`
      PARTITION BY RANGE (YEAR(`invoice_date`)) (
        PARTITION p2022 VALUES LESS THAN (2023),
        PARTITION p2023 VALUES LESS THAN (2024),
        PARTITION p2024 VALUES LESS THAN (2025),
        PARTITION p2025 VALUES LESS THAN (2026),
        PARTITION p_future VALUES LESS THAN MAXVALUE
      );

      -- Партиционирование Платежей (tabPayment) по году
      ALTER TABLE `tabPayment`
      PARTITION BY RANGE (YEAR(`trx_date`)) (
        PARTITION p2022 VALUES LESS THAN (2023),
        PARTITION p2023 VALUES LESS THAN (2024),
        PARTITION p2024 VALUES LESS THAN (2025),
        PARTITION p2025 VALUES LESS THAN (2026),
        PARTITION p_future VALUES LESS THAN MAXVALUE
      );

  - name: "Indexes"
    sql: |
      -- Индексы для ускорения выборок по датам (аналог BRIN)
      CREATE INDEX `idx_invoice_date` ON `tabInvoice` (`invoice_date`);
      CREATE INDEX `idx_payment_date` ON `tabPayment` (`trx_date`);

      -- Композитный индекс для фильтрации по статусу (аналог частичного)
      CREATE INDEX `idx_invoice_open_status` ON `tabInvoice` (`status`, `invoice_date`);

      -- Индексы по внешним ключам для ускорения JOIN'ов
      CREATE INDEX `idx_invoice_contract` ON `tabInvoice` (`contract`);
      CREATE INDEX `idx_invoice_project` ON `tabInvoice` (`project`);
      CREATE INDEX `idx_invoice_customer` ON `tabInvoice` (`customer`);
      CREATE INDEX `idx_payment_article` ON `tabPayment` (`article`);
      CREATE INDEX `idx_payment_counterparty` ON `tabPayment` (`counterparty`);
      CREATE INDEX `idx_contract_customer` ON `tabContract` (`customer`);
      CREATE INDEX `idx_contract_project` ON `tabContract` (`project`);
      CREATE INDEX `idx_project_customer` ON `tabProject` (`customer`);
      CREATE INDEX `idx_srequest_project` ON `tabService_Request` (`project`);
      CREATE INDEX `idx_srequest_engineer` ON `tabService_Request` (`assigned_engineer`);
      CREATE INDEX `idx_sreport_request` ON `tabService_Report` (`request`);
      CREATE INDEX `idx_palloc_invoice` ON `tabPayment_Allocation` (`invoice`);

      -- Функциональный индекс для поиска без учета регистра
      CREATE INDEX `idx_counterparty_name_lower` ON `tabCounterparty` ((LOWER(`name_short`)));

business_logic:
  - name: "Triggers (Data Integrity & Quality)"
    sql: |
      DELIMITER $$

      -- Триггер: Нормализация номера договора перед вставкой
      CREATE TRIGGER `trg_normalize_contract_no_insert`
      BEFORE INSERT ON `tabContract`
      FOR EACH ROW
      BEGIN
        SET NEW.contract_no_normalized = UPPER(TRIM(REPLACE(REPLACE(NEW.contract_no, '-', ''), ' ', '')));
      END$$

      -- Триггер: Нормализация номера договора перед обновлением
      CREATE TRIGGER `trg_normalize_contract_no_update`
      BEFORE UPDATE ON `tabContract`
      FOR EACH ROW
      BEGIN
        SET NEW.contract_no_normalized = UPPER(TRIM(REPLACE(REPLACE(NEW.contract_no, '-', ''), ' ', '')));
      END$$

      -- Триггер: Контроль лимита договора при проведении счета (docstatus=1)
      CREATE TRIGGER `trg_check_contract_limit`
      AFTER INSERT ON `tabInvoice`
      FOR EACH ROW
      BEGIN
        DECLARE v_contract_limit DECIMAL(18, 2);
        DECLARE v_invoiced_total DECIMAL(18, 2);

        IF NEW.contract IS NOT NULL AND NEW.docstatus = 1 THEN
          SELECT `amount_max` INTO v_contract_limit
          FROM `tabContract`
          WHERE `name` = NEW.contract;

          IF v_contract_limit IS NOT NULL AND v_contract_limit > 0 THEN
            SELECT COALESCE(SUM(`amount`), 0) INTO v_invoiced_total
            FROM `tabInvoice`
            WHERE `contract` = NEW.contract AND `docstatus` = 1;

            IF v_invoiced_total > v_contract_limit THEN
              INSERT INTO `tabData_Issue` (`entity`, `entity_id`, `severity`, `message`)
              VALUES ('Contract', NEW.contract, 'High', CONCAT('Превышен лимит договора. Лимит: ', v_contract_limit, ', Выставлено: ', v_invoiced_total));
            END IF;
          END IF;
        END IF;
      END$$

      -- Триггер: Контроль суммы распределения платежей
      CREATE TRIGGER `trg_check_payment_allocation`
      BEFORE INSERT ON `tabPayment_Allocation`
      FOR EACH ROW
      BEGIN
        DECLARE v_payment_amount DECIMAL(18, 2);
        DECLARE v_invoice_amount DECIMAL(18, 2);
        DECLARE v_total_allocated_payment DECIMAL(18, 2);
        DECLARE v_total_allocated_invoice DECIMAL(18, 2);

        SELECT `amount` INTO v_payment_amount FROM `tabPayment` WHERE `name` = NEW.payment;
        SELECT COALESCE(SUM(`amount`), 0) INTO v_total_allocated_payment FROM `tabPayment_Allocation` WHERE `payment` = NEW.payment;
        IF (v_total_allocated_payment + NEW.amount) > v_payment_amount THEN
          SIGNAL SQLSTATE '45000' SET MESSAGE_TEXT = 'Ошибка: Сумма распределений превышает сумму платежа.';
        END IF;

        SELECT `amount` INTO v_invoice_amount FROM `tabInvoice` WHERE `name` = NEW.invoice;
        SELECT COALESCE(SUM(`amount`), 0) INTO v_total_allocated_invoice FROM `tabPayment_Allocation` WHERE `invoice` = NEW.invoice;
        IF (v_total_allocated_invoice + NEW.amount) > v_invoice_amount THEN
          SIGNAL SQLSTATE '45000' SET MESSAGE_TEXT = 'Ошибка: Сумма распределений превышает сумму счета.';
        END IF;
      END$$

      DELIMITER ;

  - name: "Stored Procedures (Automation)"
    sql: |
      DELIMITER $$

      -- Вспомогательная таблица для генерации номеров
      CREATE TABLE IF NOT EXISTS `tabNamingSeriesCounter` (
        `id` INT NOT NULL AUTO_INCREMENT PRIMARY KEY,
        `series_key` VARCHAR(100) NOT NULL,
        `last_value` INT NOT NULL DEFAULT 0,
        UNIQUE KEY `idx_series_key` (`series_key`)
      ) ENGINE=InnoDB;

      -- Процедура: Генерация следующего номера счета в разрезе компании и года
      CREATE PROCEDURE `sp_get_next_invoice_number` (
        IN p_company VARCHAR(140),
        IN p_year SMALLINT,
        OUT p_next_number INT
      )
      BEGIN
        DECLARE v_series_key VARCHAR(100);
        SET v_series_key = CONCAT('INV-', p_company, '-', p_year);

        INSERT INTO `tabNamingSeriesCounter` (`series_key`, `last_value`)
        VALUES (v_series_key, 1)
        ON DUPLICATE KEY UPDATE `last_value` = `last_value` + 1;

        SELECT `last_value` INTO p_next_number
        FROM `tabNamingSeriesCounter`
        WHERE `series_key` = v_series_key;
      END$$

      DELIMITER ;

analytics_layer:
  - name: "Create Dimension Table (dim_date)"
    sql: |
      -- DDL для создания таблицы календаря. Заполнение выполняется отдельной процедурой.
      CREATE TABLE IF NOT EXISTS `dim_date` (
          `date_id` DATE NOT NULL PRIMARY KEY,
          `year` SMALLINT NOT NULL,
          `quarter` TINYINT NOT NULL,
          `month` TINYINT NOT NULL,
          `day` TINYINT NOT NULL,
          `day_of_week` TINYINT NOT NULL,
          `is_weekend` BOOLEAN NOT NULL
      ) ENGINE=InnoDB;

  - name: "Create Dimension Views"
    sql: |
      -- Измерение: Контрагенты
      CREATE OR REPLACE VIEW `dim_counterparty` AS
      SELECT
        `name` AS `counterparty_id`,
        `company`,
        `name_short`,
        `inn`
      FROM `tabCounterparty`;

      -- Измерение: Проекты
      CREATE OR REPLACE VIEW `dim_project` AS
      SELECT
        `name` AS `project_id`,
        `company`,
        `code`,
        `project_name`,
        `customer` AS `customer_id`
      FROM `tabProject`;

      -- Измерение: Статьи ДДС
      CREATE OR REPLACE VIEW `dim_article` AS
      SELECT
        `name` AS `article_id`,
        `name` AS `article_name`,
        `direction`,
        `group_name`
      FROM `tabCashflow_Article`;

  - name: "Create Fact Views (from Plan MVs)"
    sql: |
      -- Аналитическая витрина: Балансы по счетам (эквивалент mv_invoice_balance)
      CREATE OR REPLACE VIEW `mv_invoice_balance` AS
      SELECT
        i.`name` AS `invoice_id`,
        i.`invoice_no`,
        i.`invoice_date`,
        i.`company`,
        i.`contract` AS `contract_id`,
        i.`project` AS `project_id`,
        i.`customer` AS `customer_id`,
        i.`amount`,
        COALESCE(pa_sum.paid_amount, 0) AS `paid_amount`,
        (i.`amount` - COALESCE(pa_sum.paid_amount, 0)) AS `due_amount`,
        CASE
          WHEN i.`docstatus` = 2 THEN 'cancelled'
          WHEN COALESCE(pa_sum.paid_amount, 0) >= i.`amount` THEN 'paid'
          WHEN COALESCE(pa_sum.paid_amount, 0) > 0 THEN 'paid_part'
          ELSE 'sent'
        END AS `payment_status`
      FROM `tabInvoice` i
      LEFT JOIN (
        SELECT `invoice`, SUM(`amount`) AS `paid_amount`
        FROM `tabPayment_Allocation`
        GROUP BY `invoice`
      ) pa_sum ON i.`name` = pa_sum.`invoice`
      WHERE i.`docstatus` = 1;

      -- Аналитическая витрина: Обзор по договорам (эквивалент mv_contract_overview)
      CREATE OR REPLACE VIEW `mv_contract_overview` AS
      SELECT
        c.`name` AS `contract_id`,
        c.`company`,
        c.`customer` AS `customer_id`,
        c.`project` AS `project_id`,
        c.`amount_max`,
        COALESCE(inv_sum.invoiced_total, 0) AS `invoiced_total`,
        COALESCE(inv_sum.paid_total, 0) AS `paid_total`,
        (COALESCE(inv_sum.invoiced_total, 0) - COALESCE(inv_sum.paid_total, 0)) AS `outstanding_debt`,
        CASE
          WHEN c.`amount_max` > 0
          THEN (COALESCE(inv_sum.invoiced_total, 0) / c.`amount_max`) * 100
          ELSE 0
        END AS `limit_used_percent`
      FROM `tabContract` c
      LEFT JOIN (
        SELECT
          `contract_id`,
          SUM(`amount`) AS `invoiced_total`,
          SUM(`paid_amount`) AS `paid_total`
        FROM `mv_invoice_balance`
        GROUP BY `contract_id`
      ) inv_sum ON c.`name` = inv_sum.`contract_id`
      WHERE c.`docstatus` = 1;

      -- Аналитическая витрина: Дневной денежный поток (эквивалент mv_cashflow_daily)
      CREATE OR REPLACE VIEW `mv_cashflow_daily` AS
      SELECT
        `trx_date` AS `date`,
        `company`,
        SUM(CASE WHEN `direction` = 'in' THEN `amount` ELSE 0 END) AS `incoming`,
        SUM(CASE WHEN `direction` = 'out' THEN `amount` ELSE 0 END) AS `outgoing`,
        (SUM(CASE WHEN `direction` = 'in' THEN `amount` ELSE 0 END) - SUM(CASE WHEN `direction` = 'out' THEN `amount` ELSE 0 END)) AS `net_flow`
      FROM `tabPayment`
      WHERE `docstatus` = 1
      GROUP BY `trx_date`, `company`;

      -- Таблица фактов: Счета
      CREATE OR REPLACE VIEW `fact_invoice` AS
      SELECT
        `invoice_date` AS `date`,
        `company`,
        `contract_id`,
        `project_id`,
        `customer_id` AS `counterparty_id`,
        `amount`,
        `paid_amount`,
        `due_amount`
      FROM `mv_invoice_balance`;

      -- Таблица фактов: Платежи
      CREATE OR REPLACE VIEW `fact_payment` AS
      SELECT
        p.`trx_date` AS `date`,
        p.`company`,
        p.`counterparty` AS `counterparty_id`,
        p.`article` AS `article_id`,
        p.`amount`,
        p.`direction`,
        (CASE WHEN p.`direction` = 'in' THEN p.`amount` ELSE -p.`amount` END) as `amount_net`
      FROM `tabPayment` p
      WHERE p.`docstatus` = 1;
