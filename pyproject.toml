[tool.black]
line-length = 100
target-version = ["py312"]
include = "^apps/ferum_custom/.*\\.pyi?$"
extend-exclude = "(apps/erpnext/|apps/frappe/|services/|docs/|monitoring/|legacy/|build/|.*/node_modules/|env/|\\.venv/|sites/)"

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 100
skip_gitignore = true
skip = ["env", ".venv", "node_modules", "sites"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["apps/ferum_custom"]
exclude = ["apps/erpnext", "apps/frappe", "node_modules", ".git", ".bench"]
extend-exclude = "(apps/erpnext/|apps/frappe/|services/|docs/|monitoring/|legacy/|build/|env/|\\.venv/|sites/)"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B"]
# Keep E203 ignored for Black compatibility; remove W503 to avoid parser issues
ignore = ["E203"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
follow_imports = "silent"
pretty = true
files = ["apps/ferum_custom"]
exclude = ['env/', '\.venv/', 'node_modules/', 'sites/', 'apps/(frappe|erpnext)/']
