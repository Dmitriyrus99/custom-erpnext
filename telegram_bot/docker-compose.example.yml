services:
  ferum-telegram-bot:
    build: .
    image: ferum-telegram-bot:latest
    env_file:
      - .env
    environment:
      - MODE=webhook
      - PORT=8080
    ports:
      - "8080:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tg-bot.rule=Host(`erp.example.com`) && PathPrefix(`/tg-bot`)"
      - "traefik.http.routers.tg-bot.entrypoints=websecure"
      - "traefik.http.routers.tg-bot.tls=true"
