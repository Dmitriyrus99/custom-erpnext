
version: "1.0"
name: "Deploy ERP Schema Rebuild for MariaDB (Ferum Customizations)"
model: "gpt-5"
mode: "generate-and-write"

objective: >
  Применить YAML-файл схемы ERP (schema_definition, performance, business_logic, analytics_layer)
  к проекту ferum_custom (MariaDB 10.6+).
  Цель — развернуть все SQL-патчи, триггеры, процедуры и аналитические представления
  как патчи Frappe (v15_mariadb), без нарушения ORM ERPNext.

input_files:
  - path: ./erp_schema_rebuild_mariadb.yaml
    purpose: Исходное описание схемы, сгенерированное Gemini.

steps:

  - name: "1️⃣ Разбор YAML схемы и генерация SQL-файлов"
    action: |
      - Считать разделы: schema_definition, performance_optimizations, business_logic, analytics_layer.
      - Для каждого блока создать SQL-файлы:
          apps/ferum_custom/ferum_custom/patches/v15_mariadb/NNN_<slugified_name>.sql
      - Названия файлов: нумеровать с шагом 10 (010_, 020_, ...).
      - Сохранить SQL-блоки из YAML в этих файлах без изменений.
      - Добавить комментарий "# AUTOGENERATED FROM erp_schema_rebuild_mariadb.yaml".

  - name: "2️⃣ Вынесение триггеров в Python-патч"
    write:
      - path: apps/ferum_custom/ferum_custom/patches/v15_mariadb/041_triggers.py
        content: |
          import frappe

          def execute():
              # Триггеры MariaDB (интеграция без DELIMITER)
              triggers = [
                  """CREATE TRIGGER IF NOT EXISTS trg_normalize_contract_no_insert
                     BEFORE INSERT ON `tabContract`
                     FOR EACH ROW
                     SET NEW.contract_no_normalized =
                         UPPER(TRIM(REPLACE(REPLACE(NEW.contract_no, '-', ''), ' ', '')));""",

                  """CREATE TRIGGER IF NOT EXISTS trg_normalize_contract_no_update
                     BEFORE UPDATE ON `tabContract`
                     FOR EACH ROW
                     SET NEW.contract_no_normalized =
                         UPPER(TRIM(REPLACE(REPLACE(NEW.contract_no, '-', ''), ' ', '')));""",

                  """CREATE TRIGGER IF NOT EXISTS trg_check_payment_allocation
                     BEFORE INSERT ON `tabPayment_Allocation`
                     FOR EACH ROW
                     BEGIN
                       DECLARE v_payment_amount DECIMAL(18,2);
                       DECLARE v_invoice_amount DECIMAL(18,2);
                       DECLARE v_total_alloc_payment DECIMAL(18,2);
                       DECLARE v_total_alloc_invoice DECIMAL(18,2);

                       SELECT amount INTO v_payment_amount FROM `tabPayment` WHERE name=NEW.payment;
                       SELECT COALESCE(SUM(amount),0) INTO v_total_alloc_payment FROM `tabPayment_Allocation` WHERE payment=NEW.payment;
                       IF v_total_alloc_payment + NEW.amount > v_payment_amount THEN
                         SIGNAL SQLSTATE '45000' SET MESSAGE_TEXT='Сумма распределений превышает сумму платежа';
                       END IF;

                       SELECT amount INTO v_invoice_amount FROM `tabInvoice` WHERE name=NEW.invoice;
                       SELECT COALESCE(SUM(amount),0) INTO v_total_alloc_invoice FROM `tabPayment_Allocation` WHERE invoice=NEW.invoice;
                       IF v_total_alloc_invoice + NEW.amount > v_invoice_amount THEN
                         SIGNAL SQLSTATE '45000' SET MESSAGE_TEXT='Сумма распределений превышает сумму счета';
                       END IF;
                     END"""
              ]
              for t in triggers:
                  try:
                      frappe.db.sql(t)
                  except Exception as e:
                      frappe.logger().warning(f"Trigger creation skipped or failed: {e}")

  - name: "3️⃣ Вынесение процедур в Python-патч"
    write:
      - path: apps/ferum_custom/ferum_custom/patches/v15_mariadb/042_procedures.py
        content: |
          import frappe

          def execute():
              frappe.db.sql("""
              CREATE TABLE IF NOT EXISTS `tabNamingSeriesCounter` (
                  id INT AUTO_INCREMENT PRIMARY KEY,
                  series_key VARCHAR(100) NOT NULL UNIQUE,
                  last_value INT NOT NULL DEFAULT 0
              ) ENGINE=InnoDB;
              """)

              frappe.db.sql("""
              CREATE PROCEDURE IF NOT EXISTS sp_get_next_invoice_number(
                  IN p_company VARCHAR(140),
                  IN p_year SMALLINT,
                  OUT p_next_number INT
              )
              BEGIN
                  DECLARE v_series_key VARCHAR(100);
                  SET v_series_key = CONCAT('INV-', p_company, '-', p_year);
                  INSERT INTO tabNamingSeriesCounter(series_key, last_value)
                  VALUES(v_series_key, 1)
                  ON DUPLICATE KEY UPDATE last_value = last_value + 1;
                  SELECT last_value INTO p_next_number
                  FROM tabNamingSeriesCounter WHERE series_key = v_series_key;
              END
              """)

  - name: "4️⃣ Создание apply_schema.py для централизованного применения SQL"
    write:
      - path: apps/ferum_custom/ferum_custom/patches/v15_mariadb/apply_schema.py
        content: |
          import frappe, os

          def execute():
              base = frappe.get_app_path('ferum_custom', 'ferum_custom', 'patches', 'v15_mariadb')
              sql_files = [f for f in sorted(os.listdir(base)) if f.endswith('.sql')]
              for fname in sql_files:
                  path = os.path.join(base, fname)
                  with open(path, 'r', encoding='utf-8') as f:
                      sql = f.read().strip()
                      if sql:
                          frappe.db.sql(sql)
                          frappe.logger().info(f"Applied: {fname}")

  - name: "5️⃣ Обновление patches.txt"
    append:
      path: apps/ferum_custom/ferum_custom/patches.txt
      content: |
        # === MariaDB Schema Integration ===
        ferum_custom.patches.v15_mariadb.041_triggers
        ferum_custom.patches.v15_mariadb.042_procedures
        ferum_custom.patches.v15_mariadb.apply_schema

  - name: "6️⃣ Применение миграции и проверка"
    run: |
      bench --site erpclone.ferumrus.ru migrate
      pytest -q apps/ferum_custom/ferum_custom/tests
      bench --site erpclone.ferumrus.ru reload-doc ferum_custom doctype invoice

  - name: "7️⃣ Обновление документации"
    append:
      path: apps/ferum_custom/ferum_custom/docs/README.md
      content: |
        ---
        ### MariaDB Schema Deployment (Gemini → Codex)
        * YAML schema parsed and deployed as SQL + Python patches
        * Triggers moved to 041_triggers.py
        * Stored procedures moved to 042_procedures.py
        * All SQL scripts executed through apply_schema.py
        * Connected to patches.txt for automatic migrations
        * Verified via bench migrate & pytest
