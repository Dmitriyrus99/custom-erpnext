name: "Stage 2 — Architecture Consolidation"
description: |
  Этап 2. Консолидация архитектуры проекта, документирование взаимосвязей между сервисами,
  уровнями данных, ролями, интеграциями и процессами.

context:
  project_root: "/home/frappe/frappe-bench/frappe-bench"
  branch: "feature/codex-audit-impl"

steps:
  - title: "Создание архитектурного файла"
    write_file:
      path: "docs/architecture/architecture_overview.md"
      content: |
        # Ferum Customizations — System Architecture Overview

        ## Core Stack
        - Frappe v15 + ERPNext (Backend)
        - PostgreSQL 13 (DB)
        - Redis (Cache/Queue)
        - Traefik (Reverse Proxy)
        - Docker / Compose (Deployment)

        ## Integrations
        - Telegram Bot (Notifications & Workflow)
        - Google Drive/Sheets (Documents & Reports)
        - Prometheus & Grafana (Monitoring)
        - Sentry (Errors & Tracing)

        ## Layers
        - **Application:** Custom App `ferum_custom`
        - **Integration:** API Layer (FastAPI / Frappe REST)
        - **Storage:** PostgreSQL, Redis
        - **Security:** Vault, HTTPS (Let's Encrypt)
        - **Observability:** Prometheus + Sentry

        ## Data Flow
        Requests → ERPNext Controller → Service Logic → PostgreSQL → Drive/Telegram → Notification.

        ## Roles
        - Admin
        - Engineer
        - Project Manager
        - Client
        - Office Manager

        ## Diagram
        (See: docs/architecture/current_diagram.drawio)

  - title: "Создание диаграммы placeholder"
    run: |
      mkdir -p docs/architecture
      echo "<diagram placeholder>" > docs/architecture/current_diagram.drawio
      echo "[OK] Архитектура оформлена."

  - title: "Git Commit"
    run: |
      git add docs/architecture/*
      git commit -m "docs(architecture): add architecture overview and diagram base"

success_message: "✅ Stage 2 выполнен — архитектура проекта документирована."
